# ┌────────┐
# │Monitors│
# └────────┘

# See https://wiki.hypr.land/Configuring/Monitors/

# native monitor
monitor = , highres, auto, 1.25

# projector monitor
monitor=HDMI-A-1,1920x1080@60.00,768x-352,1.00

# ┌───────────┐
# │Scaling fix│
# └───────────┘

# unscale XWayland
xwayland {
  force_zero_scaling = true
}

# toolkit-specific scale
env = GDK_SCALE,2
env = XCURSOR_SIZE,24
