
  # M""MMMMM""M                   dP       oo                dP
  # M  MMMM' .M                   88                         88
  # M       .MM .d8888b. dP    dP 88d888b. dP 88d888b. .d888b88 .d8888b.
  # M  MMMb. YM 88ooood8 88    88 88'  `88 88 88'  `88 88'  `88 Y8ooooo.
  # M  MMMMb  M 88.  ... 88.  .88 88.  .88 88 88    88 88.  .88       88
  # M  MMMMM  M `88888P' `8888P88 88Y8888' dP dP    dP `88888P8 `88888P'
  # MMMMMMMMMMM               .88
  #                       d8888P



  # ┌────────┐
  # │Programs│
  # └────────┘

  # Set programs that you use
  $terminal = kitty
  $fileManager = dolphin
  $menu = fuzzel
  $editor = emacs
  $music = spotify
  $web-browser = zen-beta
  $communication = vesktop

  # See https://wiki.hypr.land/Configuring/Keywords/

  # Open applications
  bind = super, space, exec, $menu
  bind = super, return, exec, $terminal
  bind = super, F, exec, $fileManager
  bind = super, D, exec, $editor
  bind = super, M, exec, $music
  bind = super, V, exec, $communication
  bind = super, Z, exec, $web-browser

  # ┌─────────────────┐
  # │Window management│
  # └─────────────────┘

  # See https://wiki.hypr.land/Configuring/Binds/
  bind = super, Q, killactive,
  bind = super, I, fullscreen
  bind = super, O, togglefloating,
  bind = super, P, pseudo, # dwindle

  # ┌─────────┐
  # │Utilities│
  # └─────────┘

  # Open notifications
  bind = , backslash, exec, swaync-client -t -sw

  # Open clipboard history
  #bind = super, C, exec, cliphist list | rofi -dmenu -display columns 2 -p "Search Clipboard" -theme 

  # Open screenshot utility
  bind = , Print, exec, quickshell -c hyprshot -n # prtscrn
  bind = super shift, S, exec, quickshell -c hyprshot -n # sudo + shift + s

  # Open OCR
  bind = altleft shift, S, exec, hyprshot -m region --clipboard-only | tesseract stdin stdout | wl-copy # OCR

  # Hide quickshell widgets
  bind = super, B, exec, killall -SIGUSR1 quickshell

  # Refresh quickshell
  $refresh = ~/.config/hypr/UserScripts/launch.sh
  bind = super shift, B, exec, $refresh

  # Lock screen
  bind = super, Y, exec, pactl set-sink-mute @DEFAULT_SINK@ 1 && hyprlock -c ~/.config/hyprlock/hyprlock.conf

  # Exit Hyprland
  bind = super, delete, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

  # ┌──────────┐
  # │Navigation│
  # └──────────┘

  # Move focus with mainMod + arrow keys
  bind = super, left, movefocus, l
  bind = super, right, movefocus, r
  bind = super, up, movefocus, u
  bind = super, down, movefocus, d

  # Move focus with mainMod + h,j,k,l
  bind = super, h, movefocus, l
  bind = super, l, movefocus, r
  bind = super, k, movefocus, u
  bind = super, j, movefocus, d

  # Switch workspaces with mainMod + [0-9]
  bind = super, 1, workspace, 1
  bind = super, 2, workspace, 2
  bind = super, 3, workspace, 3
  bind = super, 4, workspace, 4
  bind = super, 5, workspace, 5
  bind = super, 6, workspace, 6
  bind = super, 7, workspace, 7
  bind = super, 8, workspace, 8
  bind = super, 9, workspace, 9
  bind = super, 0, workspace, 10

  # Switch to special workspace with mainMod + S
  bind = super, S, togglespecialworkspace, magic

  # ┌───────────────────┐
  # │Window manipulation│
  # └───────────────────┘

  # Move windows with mainMod + shift + h,j,k,l
  bind = super shift, h, movewindow, l
  bind = super shift, l, movewindow, r
  bind = super shift, k, movewindow, u
  bind = super shift, j, movewindow, d

  # Move windows with mainMod + shift + arrowkeys
  bind = super shift, left, movewindow, l
  bind = super shift, right, movewindow, r
  bind = super shift, up, movewindow, u
  bind = super shift, down, movewindow, d

  # Move active window to a workspace with mainMod + SHIFT + [0-9]
  bind = super shift, 1, movetoworkspace, 1
  bind = super shift, 2, movetoworkspace, 2
  bind = super shift, 3, movetoworkspace, 3
  bind = super shift, 4, movetoworkspace, 4
  bind = super shift, 5, movetoworkspace, 5
  bind = super shift, 6, movetoworkspace, 6
  bind = super shift, 7, movetoworkspace, 7
  bind = super shift, 8, movetoworkspace, 8
  bind = super shift, 9, movetoworkspace, 9
  bind = super shift, 0, movetoworkspace, 10
  bind = super shift, S, movetoworkspace, special:magic

  # Scroll through existing workspaces with mainMod + scroll
  bind = super, mouse_down, workspace, e+1
  bind = super, mouse_up, workspace, e-1

  # Move/resize windows with mainMod + LMB/RMB and dragging
  bindm = super, mouse:272, movewindow
  bindm = super, mouse:273, resizewindow

  # Resize windows with alt + arrowkeys
  bindel = altleft, left, resizeactive, -20 0
  bindel = altleft, right, resizeactive, 20 0
  bindel = altleft, up, resizeactive, 0 -20
  bindel = altleft, down, resizeactive, 0 20

  # Resize windows with alt + h,j,k,l
  bindel = altleft, l, resizeactive, 20 0
  bindel = altleft, h, resizeactive, -20 0
  bindel = altleft, k, resizeactive, 0 -20
  bindel = altleft, j, resizeactive, 0 20

  # ┌───────────────┐
  # │Laptop controls│
  # └───────────────┘

  # See https://wiki.hypr.land/Configuring/Gestures
  gesture = 3, swipe, move,
  gesture = 3, pinch, float
  gesture = 4, horizontal, workspace
  gesture = 4, up, dispatcher, global, quickshell:importmodulehereopen
  gesture = 4, down, dispatcher, global, quickshell:importmodulehereclose
  gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5 
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
  }

  # Laptop multimedia keys for volume and LCD brightness
  bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
  bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
  bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
  bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
  bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
  bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

  # Requires playerctl
  bindl = , XF86AudioNext, exec, playerctl next
  bindl = , XF86AudioPause, exec, playerctl play-pause
  bindl = , XF86AudioPlay, exec, playerctl play-pause
  bindl = , XF86AudioPrev, exec, playerctl previous

  # ┌──────────────────┐
  # │Keyboard and mouse│
  # └──────────────────┘

  # https://wiki.hypr.land/Configuring/Variables/#input
  input {
      kb_layout = us
      kb_variant =
      kb_model =
      kb_options =
      kb_rules =

  # See https://www.julienturbide.com/blog/hyprland-acceleration-curve-setup
  # for instructions on using accel.py (found on /UserScripts/)

      sensitivity = 0.5 # -1.0 - 1.0, 0 means no modification.
      accel_profile = custom 0.2144477506 0.000 0.307 0.615 1.077 1.539 2.002 2.505 3.208 3.910 4.613 5.315 6.018 6.720 7.423 8.125 8.828 9.530 10.233 10.935 12.387
      follow_mouse = 1

      touchpad {
          natural_scroll = true
      }
  }

  # See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more

