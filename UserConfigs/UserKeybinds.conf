# ┌────────┐
# │Programs│
# └────────┘

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$menu = fuzzel
$editor = emacs
$music = spotify
$web-browser = zen-beta
$communication = vesktop
$refresh = ~/.config/hypr/UserScripts/launch.sh

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Open applications
bind = $mainMod, space, exec, $menu
bind = $mainMod, return, exec, $terminal
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, D, exec, $editor
bind = $mainMod, M, exec, $music
bind = $mainMod, V, exec, $communication
bind = $mainMod, Z, exec, $web-browser

# ┌─────────────────┐
# │Window management│
# └─────────────────┘

# See https://wiki.hypr.land/Configuring/Binds/
bind = $mainMod, Q, killactive,
bind = $mainMod, U, fullscreen
bind = $mainMod, O, togglefloating,
bind = $mainMod, I, togglesplit, # dwindle
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, Y, exec, pactl set-sink-mute @DEFAULT_SINK@ 1 && hyprlock -c ~/.config/hyprlock/hyprlock.conf # lock screen
bind = $mainMod, delete, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# ┌─────────┐
# │Utilities│
# └─────────┘

# Open notifications
bind = $mainMod, N, exec, swaync-client -t -sw

# Open clipboard menu
#bind = $mainMod, C, exec,

# Open screenshot utility
bind = , Print, exec, quickshell -c hyprquickshot -n # This is for prtscrn
bind = $mainMod shift, S, exec, quickshell -c hyprquickshot -n # This is the standard screenshot chord

# Open OCR
bind = altleft shift, S, exec, hyprshot -m region --clipboard-only | tesseract stdin stdout | wl-copy # This is for text extraction

# Hide waybar
bind = $mainMod, B, exec, killall -SIGUSR1 waybar

# Refresh waybar
bind = $mainMod shift, B, exec, $refresh

# ┌──────────┐
# │Navigation│
# └──────────┘

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus with mainMod + h,j,k,l
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Switch to special workspace with mainMod + S
bind = $mainMod, S, togglespecialworkspace, magic

# ┌───────────────────┐
# │Window manipulation│
# └───────────────────┘

# Move windows with mainMod + shift + h,j,k,l
bind = $mainMod shift, h, movewindow, l
bind = $mainMod shift, l, movewindow, r
bind = $mainMod shift, k, movewindow, u
bind = $mainMod shift, j, movewindow, d

# Move windows with mainMod + shift + arrowkeys
bind = $mainMod shift, left, movewindow, l
bind = $mainMod shift, right, movewindow, r
bind = $mainMod shift, up, movewindow, u
bind = $mainMod shift, down, movewindow, d

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod shift, 1, movetoworkspace, 1
bind = $mainMod shift, 2, movetoworkspace, 2
bind = $mainMod shift, 3, movetoworkspace, 3
bind = $mainMod shift, 4, movetoworkspace, 4
bind = $mainMod shift, 5, movetoworkspace, 5
bind = $mainMod shift, 6, movetoworkspace, 6
bind = $mainMod shift, 7, movetoworkspace, 7
bind = $mainMod shift, 8, movetoworkspace, 8
bind = $mainMod shift, 9, movetoworkspace, 9
bind = $mainMod shift, 0, movetoworkspace, 10
bind = $mainMod shift, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize windows with alt + arrowkeys
bindel = altleft, left, resizeactive, -20 0
bindel = altleft, right, resizeactive, 20 0
bindel = altleft, up, resizeactive, 0 -20
bindel = altleft, down, resizeactive, 0 20

# Resize windows with alt + h,j,k,l
bindel = altleft, l, resizeactive, 20 0
bindel = altleft, h, resizeactive, -20 0
bindel = altleft, k, resizeactive, 0 -20
bindel = altleft, j, resizeactive, 0 20

# ┌───────────────┐
# │Laptop controls│
# └───────────────┘

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# ┌──────────────────┐
# │Keyboard and mouse│
# └──────────────────┘

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

# See https://www.julienturbide.com/blog/hyprland-acceleration-curve-setup
# for instructions on using accel.py (found on /UserScripts/)

    sensitivity = 0.5 # -1.0 - 1.0, 0 means no modification.
    accel_profile = custom 0.2144477506 0.000 0.307 0.615 1.077 1.539 2.002 2.505 3.208 3.910 4.613 5.315 6.018 6.720 7.423 8.125 8.828 9.530 10.233 10.935 12.387
    follow_mouse = 1

    touchpad {
        natural_scroll = true
    }
}

# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more

