  # Autostart necessary processes (like notifications daemons, status bars, etc.)

  # Widgets
  exec-once = quickshell 

  # Wallpaper
  exec-once = awww-daemon 

  # Auto-mount 
  exec-once = udiskie 

  # Idling
  exec-once = hypridle 

  # Notifications
  exec-once = swaync 

  # Clipboard
  exec-once = wl-paste --type text --watch cliphist store

  # Cursor
  exec-once = set cursor placeholder 24

