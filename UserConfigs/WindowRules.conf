# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# ┌───────────────┐
# │TUI Windowrules│
# └───────────────┘

# Float kitty
windowrule = match:class kitty, float on
windowrule = match:class kitty, size 764 440
windowrule = match:class kitty, center on

# Ignore maximize requests from all apps
windowrule = match:class .*, suppressevent maximize

# Fix some dragging issues with XWayland
windowrule = match:class ^$, match:title ^$, match:xwayland 1, match:floating 1, match:fullscreen 0, match:pinned 0, nofocus on

# Hyprland-run
windowrule = match:class hyprland-run, float on
windowrule = match:class hyprland-run, move 20 cursor-10
